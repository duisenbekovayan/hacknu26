# Запуск только брокера RabbitMQ (отдельно от корневого compose с Postgres).
# Из этой папки: docker compose up -d
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: hacknu-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hacknu
      RABBITMQ_DEFAULT_PASS: hacknu
    volumes:
      - rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rmqdata:
