# Поток: simulator → RabbitMQ telemetry.raw → normalizer → telemetry.normalized → backend (фронт внутри backend) → браузер
services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: hacknu-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hacknu
      RABBITMQ_DEFAULT_PASS: hacknu
    volumes:
      - rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hacknu
      POSTGRES_PASSWORD: hacknu
      POSTGRES_DB: locomotive
    ports:
      # Host 5433 avoids clash with a local PostgreSQL install bound to 5432 (common on dev machines).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknu -d locomotive"]
      interval: 3s
      timeout: 3s
      retries: 10

  normalizer:
    build:
      context: .
      dockerfile: normalizer/Dockerfile
    environment:
      RABBITMQ_URL: amqp://hacknu:hacknu@rabbitmq:5672/
      NORMALIZER_ENABLE_SMOOTHING: "true"
      NORMALIZER_ENABLE_DEDUP: "true"
      NORMALIZER_DEDUP_WINDOW_MS: "1500"
      NORMALIZER_STATE_TTL_MIN: "15"
      NORMALIZER_BUFFER_SIZE: "5"
      NORMALIZER_EMA_ALPHA: "0.4"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: simulators/Dockerfile
    environment:
      RABBITMQ_URL: amqp://hacknu:hacknu@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://hacknu:hacknu@postgres:5432/locomotive?sslmode=disable
      RABBITMQ_URL: amqp://hacknu:hacknu@rabbitmq:5672/
      HTTP_ADDR: :8080
      FRONTEND_DIR: /app/frontend
      # Из `.env` в корне проекта (Compose подставляет при `docker compose up`).
      # Без этого ИИ и карта в контейнере «пустые», хотя локально `go run` видит ключи.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_USE_CHAT: ${OPENAI_USE_CHAT:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      normalizer:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
  rmqdata:
