services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: hacknu-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: hacknu
      RABBITMQ_DEFAULT_PASS: hacknu
    volumes:
      - rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hacknu
      POSTGRES_PASSWORD: hacknu
      POSTGRES_DB: locomotive
    ports:
      # Host 5433 avoids clash with a local PostgreSQL install bound to 5432 (common on dev machines).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknu -d locomotive"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  rmqdata:
