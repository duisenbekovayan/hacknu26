services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hacknu
      POSTGRES_PASSWORD: hacknu
      POSTGRES_DB: locomotive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknu -d locomotive"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
