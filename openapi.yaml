openapi: 3.0.3
info:
  title: Locomotive Digital Twin API
  version: 0.1.0
  description: |
    Мок-API телеметрии (хакатон). Секреты только через переменные окружения.
    Поток телеметрии: **RabbitMQ** `telemetry.raw` → normalizer → `telemetry.normalized` → бэкенд → WebSocket дашборду.
    Дополнительно для ручных тестов: `POST /api/v1/telemetry`.

servers:
  - url: http://localhost:8080
    description: Локально

paths:
  /healthz:
    get:
      summary: Проверка живости сервиса
      responses:
        "200":
          description: OK
  /api/v1/telemetry:
    post:
      summary: Приём одной записи телеметрии
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetrySample"
      responses:
        "201":
          description: Сохранено и разослано по WebSocket
        "400":
          description: Ошибка валидации
  /api/v1/telemetry/latest:
    get:
      summary: Последняя запись по поезду
      parameters:
        - in: query
          name: train_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Объект телеметрии
        "404":
          description: Нет данных
  /api/v1/telemetry/history:
    get:
      summary: История по поезду
      description: |
        Без `minutes`: последние N записей, **новые сверху** (как раньше).
        С `minutes`: все точки за последние M минут, **от старых к новым** (удобно для графиков и replay).
      parameters:
        - in: query
          name: train_id
          required: true
          schema:
            type: string
        - in: query
          name: minutes
          description: Если задан (1–120), выборка по времени; иначе используется limit
          schema:
            type: integer
            minimum: 1
            maximum: 120
        - in: query
          name: limit
          description: Используется только без `minutes`
          schema:
            type: integer
            default: 500
      responses:
        "200":
          description: Массив записей
  /api/v1/ai/status:
    get:
      summary: Доступен ли ИИ-разбор (есть OPENAI_API_KEY на сервере)
      responses:
        "200":
          description: JSON `{ "enabled": boolean }`
  /api/v1/ai/analyze:
    post:
      summary: On-demand интерпретация снимка телеметрии (LLM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalyzeInput"
      responses:
        "200":
          description: Структурированный разбор
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalyzeOutput"
        "400":
          description: Неверный JSON
        "503":
          description: ИИ отключён (нет ключа)
        "502":
          description: Ошибка вызова модели
  /ws/telemetry:
    get:
      summary: WebSocket поток JSON записей к дашборду (после обработки на бэкенде)
  /api/v1/config:
    get:
      summary: Публичные настройки фронта (ключ Google Maps для загрузки виджета)
      responses:
        "200":
          description: JSON с полем `google_maps_api_key` (может быть пустым)

components:
  schemas:
    TelemetrySample:
      type: object
      additionalProperties: true
    AIAnalyzeInput:
      type: object
      properties:
        train_id: { type: string }
        timestamp: { type: string }
        health_index: { type: number }
        speed: { type: number }
        fuel_level: { type: number }
        engine_temp: { type: number }
        brake_pressure: { type: number }
        voltage: { type: number }
        current: { type: number }
        alerts:
          type: array
          items: { type: string }
        recent_trend_notes:
          type: array
          items: { type: string }
        mode:
          type: string
          description: empty или «actions» (акцент на рекомендациях)
    AIAnalyzeOutput:
      type: object
      properties:
        summary: { type: string }
        severity:
          type: string
          enum: [normal, warning, critical]
        probable_causes:
          type: array
          items: { type: string }
        recommendations:
          type: array
          items: { type: string }
        affected_metrics:
          type: array
          items: { type: string }
        next_risk: { type: string }
